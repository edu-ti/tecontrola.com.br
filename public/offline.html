<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te Controla - Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="text-center p-8 bg-white rounded-xl shadow-lg max-w-sm mx-auto">
        <i class="fas fa-wifi-slash text-5xl text-red-500 mb-6"></i>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Você está offline</h1>
        <p class="text-gray-600">
            Parece que não há conexão com a internet. Por favor, verifique a sua rede e tente novamente.
        </p>
    </div>
</body>
</html>
